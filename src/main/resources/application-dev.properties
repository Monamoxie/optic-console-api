# src/main/resources/application-dev.properties
# Development specific settings

# IMPORTANT: Disable auto-migration in dev
# Run migrations manually when ready: ./mvnw flyway:migrate
spring.flyway.enabled=false

# Hibernate: TEMPORARY - set to 'none' until migrations are ready
# Change back to 'validate' once you run migrations
spring.jpa.hibernate.ddl-auto=none

# ============================================================
# LOGGING CONFIGURATION (Clean & Focused)
# ============================================================

# Root logging level (keeps most libraries quiet)
logging.level.root=WARN

# Your application logs (highlight your own code)
logging.level.com.optic.console=INFO

# Spring Framework (silent unless error)
logging.level.org.springframework=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.autoconfigure=ERROR

# Hibernate/JPA (hide SQL by default - uncomment below to show)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type=WARN
logging.level.org.hibernate.engine=ERROR
logging.level.org.hibernate.orm.deprecation=ERROR

# Uncomment these two lines to see SQL queries when debugging:
# spring.jpa.show-sql=true
# logging.level.org.hibernate.SQL=DEBUG

# Flyway (only show when you run it)
logging.level.org.flywaydb=WARN

# Tomcat (silent startup)
logging.level.org.apache.catalina=ERROR
logging.level.org.apache.coyote=ERROR
logging.level.org.apache.tomcat=ERROR

# HikariCP (connection pool - silent)
logging.level.com.zaxxer.hikari=ERROR

# Banner (hide Spring Boot banner for cleaner startup)
spring.main.banner-mode=off

# Custom log pattern (shorter and cleaner)
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%5p) %clr(%-35.35logger{34}){cyan} : %m%n%wEx

# CORS - allow common dev ports
cors.allowed-origins=http://localhost:3000,http://localhost:3200
