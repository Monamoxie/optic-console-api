# src/main/resources/application-dev-minimal.properties
# Ultra-minimal logging for focused work

# Disable auto-migration
spring.flyway.enabled=false

# Hibernate: validate only
spring.jpa.hibernate.ddl-auto=validate

# ============================================================
# MINIMAL LOGGING (Only your app + errors)
# ============================================================

# Root: only show warnings/errors
logging.level.root=WARN

# Your application: INFO level (not DEBUG)
logging.level.com.optic.console=INFO

# Hide SQL completely
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# Only show errors from Spring
logging.level.org.springframework=WARN

# Only show errors from Flyway
logging.level.org.flywaydb=WARN

# Custom pattern (even shorter)
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%5p) %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:3200